name: Bug report
description: Report a reproducible defect
title: "[Bug] "
body:
  - type: textarea
    id: behavior
    attributes:
      label: Current behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
    validations:
      required: true
